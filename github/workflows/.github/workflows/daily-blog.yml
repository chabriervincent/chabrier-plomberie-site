name: Generation Article Blog SEO

on:
  schedule:
    # Phase BOOST : tous les 3 jours (1,4,7,10,13,16,19,22,25,28 du mois)
    # Phase CROISIERE plus tard : remplacer par  '0 8 * * 1'  (chaque lundi)
    - cron: '0 8 1,4,7,10,13,16,19,22,25,28 * *'
  workflow_dispatch:
    inputs:
      topic:
        description: 'Sujet personnalise (laisser vide pour automatique)'
        required: false
        default: ''

jobs:
  generate-article:
    name: Generer et publier un article
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configurer Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Installer les dependances
        run: pip install anthropic google-auth

      - name: Generer l'article SEO
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GOOGLE_INDEXING_KEY: ${{ secrets.GOOGLE_INDEXING_KEY }}
          INDEXNOW_KEY: ${{ secrets.INDEXNOW_KEY }}
          CUSTOM_TOPIC: ${{ github.event.inputs.topic }}
        run: python scripts/generate_article.py

      - name: Commit et push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "SEO Bot - Chabrier Plomberie"
          git add -A blog/
          git add sitemap.xml robots.txt
          git add scripts/topics.json scripts/articles_index.json
          LATEST=$(ls -t blog/*.html 2>/dev/null | grep -v index | head -1)
          if [ -n "$LATEST" ]; then
            SLUG=$(basename "$LATEST" .html)
            git commit -m "Nouvel article SEO : $SLUG" || echo "Rien a commiter"
          else
            git commit -m "Mise a jour blog SEO" || echo "Rien a commiter"
          fi
          git push

      - name: Resume
        run: |
          echo "### Article publie" >> $GITHUB_STEP_SUMMARY
          LATEST=$(ls -t blog/*.html 2>/dev/null | grep -v index | head -1)
          if [ -n "$LATEST" ]; then
            SLUG=$(basename "$LATEST" .html)
            echo "URL : https://chabrier-plomberie.fr/blog/$SLUG.html" >> $GITHUB_STEP_SUMMARY
          fi
